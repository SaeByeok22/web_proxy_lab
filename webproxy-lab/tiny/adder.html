<html>
<head><title>Tiny Adder</title></head>
<body>
<h1>Tiny CGI Adder</h1>
<form action="/cgi-bin/adder" method="GET">
  <p>
    <label>First number:
      <input type="text" name="a">
    </label>
  </p>
  <p>
    <label>Second number:
      <input type="text" name="b">
    </label>
  </p>
  <p>
    <input type="submit" value="Add">
  </p>
</form>
</body>
</html>
